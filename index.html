<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BUDGET_SYS v2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=IBM+Plex+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0d0f0d;
  --surface: #111411;
  --neu-light: #1a1e1a;
  --neu-dark: #080a08;
  --border: #1f2d1f;
  --green: #00ff41;
  --green-dim: #00cc33;
  --green-dark: #003d10;
  --green-glow: rgba(0,255,65,0.15);
  --red: #ff2244;
  --red-dim: #cc1133;
  --red-glow: rgba(255,34,68,0.15);
  --amber: #ffaa00;
  --text: #c8ffc8;
  --sub: #4a7a4a;
  --mono: 'Share Tech Mono', monospace;
  --display: 'Orbitron', monospace;
  --body: 'IBM Plex Sans Thai', sans-serif;
  --neu-shadow: 6px 6px 12px var(--neu-dark), -3px -3px 8px var(--neu-light);
  --neu-inset: inset 3px 3px 8px var(--neu-dark), inset -2px -2px 6px var(--neu-light);
  --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scanline overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* Grid bg */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: linear-gradient(rgba(0,255,65,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,65,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 16px 12px 100px; }

/* Header */
.header { padding: 20px 0 24px; }
.header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.sys-badge {
  font-family: var(--mono);
  font-size: 10px;
  background: var(--green-dark);
  color: var(--green);
  border: 1px solid var(--green);
  padding: 2px 8px;
  border-radius: 3px;
  letter-spacing: 2px;
  animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }
.header h1 {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 900;
  color: var(--green);
  letter-spacing: 3px;
  text-shadow: 0 0 20px var(--green), 0 0 40px rgba(0,255,65,0.3);
}
.header-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--sub);
  letter-spacing: 1px;
}
.cursor { display: inline-block; animation: cur 1s step-end infinite; }
@keyframes cur { 0%,100%{opacity:1} 50%{opacity:0} }

/* Neu card */
.neu {
  background: var(--surface);
  box-shadow: var(--neu-shadow);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

/* Dashboard */
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.dash-card {
  background: var(--surface);
  box-shadow: var(--neu-shadow);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 14px;
  position: relative;
  overflow: hidden;
}
.dash-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.dash-card.income::before { background: linear-gradient(90deg, transparent, var(--green), transparent); }
.dash-card.expense::before { background: linear-gradient(90deg, transparent, var(--red), transparent); }
.dash-card.balance::before { background: linear-gradient(90deg, transparent, var(--amber), transparent); }
.dash-card.balance { grid-column: span 2; display: flex; align-items: center; justify-content: space-between; }

.dash-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--sub);
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.dash-value {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.dash-value.income { color: var(--green); text-shadow: 0 0 10px var(--green); }
.dash-value.expense { color: var(--red); text-shadow: 0 0 10px var(--red); }
.dash-value.positive { color: var(--green); text-shadow: 0 0 10px var(--green); }
.dash-value.negative { color: var(--red); text-shadow: 0 0 10px var(--red); }
.dash-value.zero { color: var(--amber); }
.dash-bar { height: 3px; background: var(--neu-dark); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.dash-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
.dash-bar-fill.income { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dash-bar-fill.expense { background: var(--red); box-shadow: 0 0 6px var(--red); }

.balance-info { text-align: right; }
.balance-month {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--sub);
  margin-bottom: 4px;
}

/* Nav tabs */
.nav {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-bottom: 16px;
  background: var(--surface);
  box-shadow: var(--neu-shadow);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 6px;
}
.nav-btn {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  padding: 10px 6px;
  border: none;
  border-radius: 10px;
  background: transparent;
  color: var(--sub);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.nav-btn.active {
  background: var(--green-dark);
  color: var(--green);
  box-shadow: var(--neu-inset);
  border: 1px solid rgba(0,255,65,0.2);
  text-shadow: 0 0 8px var(--green);
}

/* Sections */
.section { display: none; }
.section.active { display: block; }

/* ADD FORM */
.form-card { padding: 18px; margin-bottom: 12px; }
.form-prompt {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--green);
  margin-bottom: 14px;
  letter-spacing: 1px;
}
.form-prompt span { color: var(--sub); }

.field { margin-bottom: 12px; }
.field label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--sub);
  letter-spacing: 2px;
  display: block;
  margin-bottom: 6px;
}
.field input, .field select {
  width: 100%;
  background: var(--bg);
  box-shadow: var(--neu-inset);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 14px;
  font-family: var(--mono);
  font-size: 14px;
  color: var(--green);
  outline: none;
  transition: all 0.2s;
  -webkit-appearance: none;
}
.field input:focus, .field select:focus {
  border-color: rgba(0,255,65,0.3);
  box-shadow: var(--neu-inset), 0 0 0 2px rgba(0,255,65,0.08);
}
.field input::placeholder { color: var(--sub); }
.field select option { background: var(--bg); color: var(--text); }

.type-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.type-btn {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  box-shadow: var(--neu-shadow);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 1px;
  cursor: pointer;
  color: var(--sub);
  transition: all 0.2s;
  text-align: center;
}
.type-btn.active-income {
  background: var(--green-dark);
  color: var(--green);
  border-color: rgba(0,255,65,0.3);
  box-shadow: var(--neu-inset), 0 0 15px rgba(0,255,65,0.1);
  text-shadow: 0 0 8px var(--green);
}
.type-btn.active-expense {
  background: rgba(255,34,68,0.08);
  color: var(--red);
  border-color: rgba(255,34,68,0.3);
  box-shadow: var(--neu-inset), 0 0 15px rgba(255,34,68,0.1);
  text-shadow: 0 0 8px var(--red);
}

.btn-exec {
  width: 100%;
  padding: 14px;
  background: var(--green-dark);
  border: 1px solid rgba(0,255,65,0.3);
  border-radius: 10px;
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--green);
  cursor: pointer;
  box-shadow: var(--neu-shadow), 0 0 20px rgba(0,255,65,0.1);
  text-shadow: 0 0 10px var(--green);
  transition: all 0.15s;
  margin-top: 4px;
}
.btn-exec:active { box-shadow: var(--neu-inset); transform: scale(0.99); }

/* Filter bar */
.filter-bar { display: flex; gap: 8px; margin-bottom: 12px; }
.filter-bar select {
  flex: 1;
  background: var(--surface);
  box-shadow: var(--neu-shadow);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--sub);
  outline: none;
  -webkit-appearance: none;
}
.btn-csv {
  background: var(--surface);
  box-shadow: var(--neu-shadow);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 14px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--sub);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.btn-csv:hover { color: var(--green); border-color: rgba(0,255,65,0.2); }

/* Transaction list */
.month-group { margin-bottom: 20px; }
.month-head {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--sub);
  letter-spacing: 3px;
  margin-bottom: 8px;
  padding-left: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.month-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.tx-item {
  background: var(--surface);
  box-shadow: var(--neu-shadow);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: slideIn 0.2s ease;
  position: relative;
  overflow: hidden;
}
.tx-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 12px 0 0 12px;
}
.tx-item.income::before { background: var(--green); box-shadow: 0 0 8px var(--green); }
.tx-item.expense::before { background: var(--red); box-shadow: 0 0 8px var(--red); }

@keyframes slideIn { from { opacity:0; transform: translateX(-8px); } to { opacity:1; transform: none; } }

.tx-info { flex: 1; min-width: 0; }
.tx-desc {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tx-meta { font-size: 11px; color: var(--sub); margin-top: 3px; font-family: var(--mono); }
.tx-cat {
  font-family: var(--mono);
  font-size: 10px;
  background: var(--green-dark);
  color: var(--green-dim);
  border: 1px solid rgba(0,255,65,0.1);
  padding: 2px 7px;
  border-radius: 4px;
  letter-spacing: 1px;
  flex-shrink: 0;
}
.tx-amount {
  font-family: var(--mono);
  font-size: 15px;
  font-weight: 700;
  flex-shrink: 0;
}
.tx-amount.income { color: var(--green); text-shadow: 0 0 8px var(--green); }
.tx-amount.expense { color: var(--red); text-shadow: 0 0 8px var(--red); }

.tx-actions { display: flex; gap: 4px; flex-shrink: 0; }
.btn-icon {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 13px;
  color: var(--sub);
  transition: all 0.15s;
}
.btn-icon:hover.edit { border-color: rgba(0,255,65,0.3); color: var(--green); }
.btn-icon:hover.del { border-color: rgba(255,34,68,0.3); color: var(--red); }

.empty {
  text-align: center;
  padding: 50px 20px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--sub);
  letter-spacing: 2px;
}

/* Charts */
.chart-card { padding: 18px; margin-bottom: 12px; }
.chart-title {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--sub);
  letter-spacing: 3px;
  margin-bottom: 14px;
}
.chart-wrap { position: relative; height: 180px; }

/* Edit Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  padding: 20px 16px 40px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 -10px 40px rgba(0,255,65,0.05);
  transform: translateY(100%);
  transition: transform 0.3s ease;
}
.modal-overlay.show .modal { transform: translateY(0); }
.modal-title {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--green);
  letter-spacing: 3px;
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
.btn-cancel {
  padding: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--sub);
  cursor: pointer;
  letter-spacing: 2px;
}
.btn-save {
  padding: 12px;
  background: var(--green-dark);
  border: 1px solid rgba(0,255,65,0.3);
  border-radius: 10px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--green);
  cursor: pointer;
  letter-spacing: 2px;
  text-shadow: 0 0 8px var(--green);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--green-dark);
  border: 1px solid rgba(0,255,65,0.3);
  color: var(--green);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 2px;
  padding: 10px 20px;
  border-radius: 8px;
  z-index: 2000;
  transition: transform 0.3s ease;
  text-shadow: 0 0 8px var(--green);
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <span class="sys-badge">● LIVE</span>
      <h1>BUDGET_SYS</h1>
    </div>
    <div class="header-sub">v2.0 // <span id="nowTime"></span><span class="cursor">_</span></div>
  </div>

  <!-- Dashboard always visible -->
  <div class="dash-grid">
    <div class="dash-card income">
      <div class="dash-label">// INCOME</div>
      <div class="dash-value income" id="dIncome">฿0</div>
      <div class="dash-bar"><div class="dash-bar-fill income" id="barIncome" style="width:0%"></div></div>
    </div>
    <div class="dash-card expense">
      <div class="dash-label">// EXPENSE</div>
      <div class="dash-value expense" id="dExpense">฿0</div>
      <div class="dash-bar"><div class="dash-bar-fill expense" id="barExpense" style="width:0%"></div></div>
    </div>
    <div class="dash-card balance">
      <div>
        <div class="dash-label">// NET_BALANCE</div>
        <div class="dash-value" id="dBalance">฿0</div>
      </div>
      <div class="balance-info">
        <div class="balance-month" id="dMonth">—</div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--sub)" id="dTxCount">0 TX</div>
      </div>
    </div>
  </div>

  <!-- Nav -->
  <div class="nav">
    <button class="nav-btn active" onclick="switchSection('add',this)">[ ADD ]</button>
    <button class="nav-btn" onclick="switchSection('list',this)">[ LOG ]</button>
    <button class="nav-btn" onclick="switchSection('chart',this)">[ STAT ]</button>
  </div>

  <!-- ADD Section -->
  <div id="secAdd" class="section active">
    <div class="neu form-card">
      <div class="form-prompt"><span>root@budget:~$ </span>insert_record --new</div>

      <div class="type-row">
        <button class="type-btn active-income" id="btnIncome" onclick="setType('income')">▲ INCOME</button>
        <button class="type-btn" id="btnExpense" onclick="setType('expense')">▼ EXPENSE</button>
      </div>

      <div class="field">
        <label>// DESCRIPTION</label>
        <input type="text" id="desc" placeholder="ระบุรายการ...">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div class="field">
          <label>// AMOUNT (THB)</label>
          <input type="number" id="amount" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="field">
          <label>// DATE</label>
          <input type="date" id="date">
        </div>
      </div>
      <div class="field">
        <label>// CATEGORY</label>
        <select id="category">
          <option value="อื่นๆ">── OTHER ──</option>
          <option value="อาหาร">FOOD</option>
          <option value="เดินทาง">TRANSPORT</option>
          <option value="ช้อปปิ้ง">SHOPPING</option>
          <option value="สุขภาพ">HEALTH</option>
          <option value="บันเทิง">ENTERTAIN</option>
          <option value="บิล/ค่าน้ำค่าไฟ">UTILITIES</option>
          <option value="เงินเดือน">SALARY</option>
          <option value="ฟรีแลนซ์">FREELANCE</option>
          <option value="ลงทุน">INVEST</option>
        </select>
      </div>
      <button class="btn-exec" onclick="addTransaction()">► EXECUTE_INSERT</button>
    </div>
  </div>

  <!-- LIST Section -->
  <div id="secList" class="section">
    <div class="filter-bar">
      <select id="filterMonth" onchange="renderList()">
        <option value="">ALL_MONTHS</option>
      </select>
      <select id="filterType" onchange="renderList()">
        <option value="">ALL_TYPE</option>
        <option value="income">INCOME</option>
        <option value="expense">EXPENSE</option>
      </select>
      <button class="btn-csv" onclick="exportCSV()">⬇ CSV</button>
    </div>
    <div id="txList"></div>
  </div>

  <!-- CHART Section -->
  <div id="secChart" class="section">
    <div class="neu chart-card">
      <div class="chart-title">// INCOME_vs_EXPENSE [6M]</div>
      <div class="chart-wrap"><canvas id="chartBar"></canvas></div>
    </div>
    <div class="neu chart-card">
      <div class="chart-title">// EXPENSE_BY_CATEGORY</div>
      <div class="chart-wrap"><canvas id="chartDoughnut"></canvas></div>
    </div>
  </div>

</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">// EDIT_RECORD</div>
    <input type="hidden" id="editId">
    <div class="type-row">
      <button class="type-btn active-income" id="editBtnIncome" onclick="setEditType('income')">▲ INCOME</button>
      <button class="type-btn" id="editBtnExpense" onclick="setEditType('expense')">▼ EXPENSE</button>
    </div>
    <div class="field"><label>// DESCRIPTION</label><input type="text" id="editDesc"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="field"><label>// AMOUNT</label><input type="number" id="editAmount" min="0" step="0.01"></div>
      <div class="field"><label>// DATE</label><input type="date" id="editDate"></div>
    </div>
    <div class="field">
      <label>// CATEGORY</label>
      <select id="editCategory">
        <option value="อื่นๆ">── OTHER ──</option>
        <option value="อาหาร">FOOD</option>
        <option value="เดินทาง">TRANSPORT</option>
        <option value="ช้อปปิ้ง">SHOPPING</option>
        <option value="สุขภาพ">HEALTH</option>
        <option value="บันเทิง">ENTERTAIN</option>
        <option value="บิล/ค่าน้ำค่าไฟ">UTILITIES</option>
        <option value="เงินเดือน">SALARY</option>
        <option value="ฟรีแลนซ์">FREELANCE</option>
        <option value="ลงทุน">INVEST</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">[ CANCEL ]</button>
      <button class="btn-save" onclick="saveEdit()">[ SAVE ]</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const KEY = 'budget_v2';
let txs = JSON.parse(localStorage.getItem(KEY) || '[]');
let currentType = 'income';
let editType = 'income';
let chartBar, chartDoughnut;

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('nowTime').textContent = now.toLocaleString('th-TH', {
    day:'2-digit', month:'2-digit', year:'2-digit',
    hour:'2-digit', minute:'2-digit', second:'2-digit'
  }).replace(',','');
}
updateClock();
setInterval(updateClock, 1000);

document.getElementById('date').valueAsDate = new Date();

function save() { localStorage.setItem(KEY, JSON.stringify(txs)); }

function fmt(n) {
  return '฿' + Math.abs(n).toLocaleString('th-TH', {minimumFractionDigits: 0, maximumFractionDigits: 2});
}

function setType(t) {
  currentType = t;
  document.getElementById('btnIncome').className = 'type-btn' + (t==='income' ? ' active-income' : '');
  document.getElementById('btnExpense').className = 'type-btn' + (t==='expense' ? ' active-expense' : '');
}

function setEditType(t) {
  editType = t;
  document.getElementById('editBtnIncome').className = 'type-btn' + (t==='income' ? ' active-income' : '');
  document.getElementById('editBtnExpense').className = 'type-btn' + (t==='expense' ? ' active-expense' : '');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function addTransaction() {
  const desc = document.getElementById('desc').value.trim();
  const amount = parseFloat(document.getElementById('amount').value);
  const date = document.getElementById('date').value;
  const category = document.getElementById('category').value;
  if (!desc) { showToast('! ERROR: DESC_REQUIRED'); return; }
  if (!amount || amount <= 0) { showToast('! ERROR: AMOUNT_INVALID'); return; }
  if (!date) { showToast('! ERROR: DATE_REQUIRED'); return; }
  txs.unshift({ id: Date.now(), desc, amount, date, category, type: currentType });
  save(); renderAll();
  document.getElementById('desc').value = '';
  document.getElementById('amount').value = '';
  document.getElementById('date').valueAsDate = new Date();
  showToast('✓ RECORD_INSERTED');
}

function deleteTransaction(id) {
  txs = txs.filter(t => t.id !== id);
  save(); renderAll();
  showToast('✓ RECORD_DELETED');
}

function openEdit(id) {
  const t = txs.find(x => x.id === id);
  if (!t) return;
  document.getElementById('editId').value = id;
  document.getElementById('editDesc').value = t.desc;
  document.getElementById('editAmount').value = t.amount;
  document.getElementById('editDate').value = t.date;
  document.getElementById('editCategory').value = t.category;
  setEditType(t.type);
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('show');
  }
}

function saveEdit() {
  const id = parseInt(document.getElementById('editId').value);
  const desc = document.getElementById('editDesc').value.trim();
  const amount = parseFloat(document.getElementById('editAmount').value);
  const date = document.getElementById('editDate').value;
  const category = document.getElementById('editCategory').value;
  if (!desc || !amount || !date) { showToast('! ERROR: FIELDS_INCOMPLETE'); return; }
  const idx = txs.findIndex(t => t.id === id);
  if (idx > -1) {
    txs[idx] = { ...txs[idx], desc, amount, date, category, type: editType };
    save(); renderAll();
    closeModal();
    showToast('✓ RECORD_UPDATED');
  }
}

function renderDash() {
  const income = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;
  const max = Math.max(income, expense) || 1;

  document.getElementById('dIncome').textContent = fmt(income);
  document.getElementById('dExpense').textContent = fmt(expense);
  document.getElementById('barIncome').style.width = (income/max*100)+'%';
  document.getElementById('barExpense').style.width = (expense/max*100)+'%';

  const el = document.getElementById('dBalance');
  el.textContent = (balance < 0 ? '-' : '+') + fmt(balance);
  el.className = 'dash-value ' + (balance > 0 ? 'positive' : balance < 0 ? 'negative' : 'zero');

  const now = new Date();
  document.getElementById('dMonth').textContent = now.toLocaleDateString('th-TH',{month:'long',year:'numeric'});
  document.getElementById('dTxCount').textContent = txs.length + ' TX';
}

function populateMonthFilter() {
  const months = [...new Set(txs.map(t => t.date.slice(0,7)))].sort().reverse();
  const sel = document.getElementById('filterMonth');
  const cur = sel.value;
  sel.innerHTML = '<option value="">ALL_MONTHS</option>';
  months.forEach(m => {
    const [y, mo] = m.split('-');
    const label = new Date(y, mo-1).toLocaleDateString('th-TH',{month:'short',year:'2-digit'}).toUpperCase();
    sel.innerHTML += `<option value="${m}" ${m===cur?'selected':''}>${label}</option>`;
  });
}

function renderList() {
  const fm = document.getElementById('filterMonth').value;
  const ft = document.getElementById('filterType').value;
  const filtered = txs.filter(t => {
    if (fm && !t.date.startsWith(fm)) return false;
    if (ft && t.type !== ft) return false;
    return true;
  });

  const container = document.getElementById('txList');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">// NO_RECORDS_FOUND</div>';
    return;
  }

  const groups = {};
  filtered.forEach(t => {
    const key = t.date.slice(0,7);
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });

  container.innerHTML = Object.keys(groups).sort().reverse().map(key => {
    const [y, mo] = key.split('-');
    const label = new Date(y, mo-1).toLocaleDateString('th-TH',{month:'long',year:'numeric'}).toUpperCase();
    const items = groups[key].map(t => `
      <div class="tx-item ${t.type}">
        <div class="tx-info">
          <div class="tx-desc">${t.desc}</div>
          <div class="tx-meta">${formatDate(t.date)} · <span class="tx-cat">${t.category}</span></div>
        </div>
        <span class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</span>
        <div class="tx-actions">
          <button class="btn-icon edit" onclick="openEdit(${t.id})" title="แก้ไข">✎</button>
          <button class="btn-icon del" onclick="deleteTransaction(${t.id})" title="ลบ">✕</button>
        </div>
      </div>
    `).join('');
    return `<div class="month-group"><div class="month-head">${label}</div>${items}</div>`;
  }).join('');
}

function formatDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('th-TH', {day:'numeric',month:'short'});
}

function renderCharts() {
  const now = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(d.toISOString().slice(0,7));
  }
  const incomes = months.map(m => txs.filter(t=>t.type==='income'&&t.date.startsWith(m)).reduce((s,t)=>s+t.amount,0));
  const expenses = months.map(m => txs.filter(t=>t.type==='expense'&&t.date.startsWith(m)).reduce((s,t)=>s+t.amount,0));
  const labels = months.map(m => { const [y,mo]=m.split('-'); return new Date(y,mo-1).toLocaleDateString('th-TH',{month:'short'}).toUpperCase(); });

  Chart.defaults.color = '#4a7a4a';
  Chart.defaults.font.family = 'Share Tech Mono';

  if (chartBar) chartBar.destroy();
  chartBar = new Chart(document.getElementById('chartBar'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'INCOME', data: incomes, backgroundColor: 'rgba(0,255,65,0.1)', borderColor: '#00ff41', borderWidth: 1.5, borderRadius: 4 },
        { label: 'EXPENSE', data: expenses, backgroundColor: 'rgba(255,34,68,0.1)', borderColor: '#ff2244', borderWidth: 1.5, borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { font: { size: 10 }, boxWidth: 10 } } },
      scales: {
        y: { grid: { color: 'rgba(0,255,65,0.05)' }, ticks: { callback: v => '฿'+v.toLocaleString(), font: { size: 9 } } },
        x: { grid: { display: false }, ticks: { font: { size: 10 } } }
      }
    }
  });

  const catMap = {};
  txs.filter(t=>t.type==='expense').forEach(t => { catMap[t.category] = (catMap[t.category]||0) + t.amount; });
  const catLabels = Object.keys(catMap);
  const catData = catLabels.map(k => catMap[k]);
  const colors = ['#00ff41','#00cc33','#009922','#ff2244','#cc1133','#ffaa00','#ff7700','#00aaff','#7700ff','#ff00aa'];

  if (chartDoughnut) chartDoughnut.destroy();
  if (!catLabels.length) {
    document.getElementById('chartDoughnut').parentElement.innerHTML = '<div class="empty" style="padding:30px 0">// NO_EXPENSE_DATA</div>';
    return;
  }
  chartDoughnut = new Chart(document.getElementById('chartDoughnut'), {
    type: 'doughnut',
    data: {
      labels: catLabels,
      datasets: [{ data: catData, backgroundColor: colors.map(c=>c+'22'), borderColor: colors, borderWidth: 1.5 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { font: { size: 9 }, boxWidth: 10, padding: 10 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ฿${ctx.raw.toLocaleString()}` } }
      }
    }
  });
}

function renderAll() {
  renderDash();
  populateMonthFilter();
  renderList();
}

function switchSection(name, el) {
  ['Add','List','Chart'].forEach(s => {
    document.getElementById('sec'+s).classList.remove('active');
  });
  document.getElementById('sec' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (name === 'chart') renderCharts();
  if (name === 'list') renderList();
}

function exportCSV() {
  const fm = document.getElementById('filterMonth').value;
  const ft = document.getElementById('filterType').value;
  const filtered = txs.filter(t => {
    if (fm && !t.date.startsWith(fm)) return false;
    if (ft && t.type !== ft) return false;
    return true;
  });
  if (!filtered.length) { showToast('! ERROR: NO_DATA_TO_EXPORT'); return; }
  const rows = [['DATE','DESC','CATEGORY','TYPE','AMOUNT_THB']];
  filtered.forEach(t => rows.push([t.date, t.desc, t.category, t.type.toUpperCase(), t.amount]));
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='budget_export.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('✓ CSV_EXPORTED');
}

renderAll();
</script>
</body>
</html>
