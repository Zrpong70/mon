<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บัญชีส่วนตัว</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --text: #1a1a18;
    --sub: #888880;
    --income: #2d6a4f;
    --expense: #c1121f;
    --accent: #1a1a18;
    --tag-bg: #f0ede6;
    --radius: 12px;
    --font: 'IBM Plex Sans Thai', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 80px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }
  .subtitle { color: var(--sub); font-size: 13px; margin-bottom: 24px; }

  /* Summary Cards */
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .card-label { font-size: 12px; color: var(--sub); margin-bottom: 6px; letter-spacing: 0.3px; }
  .card-value {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.5px;
  }
  .card-value.income { color: var(--income); }
  .card-value.expense { color: var(--expense); }
  .card-value.balance {}

  /* Form */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
  }
  .form-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 120px; }
  .form-group label { font-size: 12px; color: var(--sub); }
  .form-group input, .form-group select {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 20px;
    font-size: 14px;
    font-family: var(--font);
    font-weight: 500;
    cursor: pointer;
    align-self: flex-end;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn-add:hover { opacity: 0.85; }

  /* Type toggle */
  .type-toggle { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .type-btn {
    flex: 1;
    padding: 9px 12px;
    font-size: 13px;
    font-family: var(--font);
    font-weight: 500;
    border: none;
    background: var(--bg);
    cursor: pointer;
    transition: all 0.15s;
    color: var(--sub);
  }
  .type-btn.active-income { background: #e8f5ee; color: var(--income); }
  .type-btn.active-expense { background: #fdecea; color: var(--expense); }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab {
    padding: 7px 16px;
    font-size: 13px;
    font-family: var(--font);
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    cursor: pointer;
    color: var(--sub);
    transition: all 0.15s;
  }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* List */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-title { font-size: 14px; font-weight: 600; }
  .btn-csv {
    font-size: 12px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    cursor: pointer;
    font-family: var(--font);
    color: var(--sub);
    transition: all 0.15s;
  }
  .btn-csv:hover { border-color: var(--accent); color: var(--accent); }

  .month-group { margin-bottom: 20px; }
  .month-label {
    font-size: 12px;
    color: var(--sub);
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .tx-list { display: flex; flex-direction: column; gap: 6px; }
  .tx-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: none; } }
  .tx-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .tx-dot.income { background: var(--income); }
  .tx-dot.expense { background: var(--expense); }
  .tx-info { flex: 1; min-width: 0; }
  .tx-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .tx-cat {
    font-size: 11px;
    background: var(--tag-bg);
    color: var(--sub);
    padding: 2px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .tx-amount {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .tx-amount.income { color: var(--income); }
  .tx-amount.expense { color: var(--expense); }
  .btn-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--border);
    font-size: 16px;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .btn-del:hover { color: var(--expense); }
  .empty { text-align: center; padding: 40px 20px; color: var(--sub); font-size: 14px; }

  /* Chart */
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .chart-title { font-size: 13px; font-weight: 600; margin-bottom: 16px; color: var(--sub); }
  .chart-wrap { position: relative; height: 200px; }

  /* Filter */
  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-select {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: var(--font);
    background: var(--surface);
    color: var(--text);
    outline: none;
  }
</style>
</head>
<body>

<h1>บัญชีส่วนตัว 📒</h1>
<p class="subtitle">บันทึกรายรับ-รายจ่าย เก็บไว้ใน browser นี้เครื่อง</p>

<!-- Summary -->
<div class="cards">
  <div class="card">
    <div class="card-label">รายรับ</div>
    <div class="card-value income" id="totalIncome">฿0</div>
  </div>
  <div class="card">
    <div class="card-label">รายจ่าย</div>
    <div class="card-value expense" id="totalExpense">฿0</div>
  </div>
  <div class="card">
    <div class="card-label">คงเหลือ</div>
    <div class="card-value" id="totalBalance">฿0</div>
  </div>
</div>

<!-- Add Form -->
<div class="form-card">
  <div class="form-title">เพิ่มรายการ</div>
  <div class="form-row" style="margin-bottom:10px;">
    <div class="form-group" style="flex:2;min-width:160px;">
      <label>รายการ</label>
      <input type="text" id="desc" placeholder="เช่น ค่ากาแฟ, เงินเดือน">
    </div>
    <div class="form-group" style="flex:1;min-width:100px;">
      <label>จำนวน (บาท)</label>
      <input type="number" id="amount" placeholder="0" min="0" step="0.01">
    </div>
    <div class="form-group" style="flex:1;min-width:120px;">
      <label>วันที่</label>
      <input type="date" id="date">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group" style="flex:1;min-width:120px;">
      <label>ประเภท</label>
      <div class="type-toggle">
        <button class="type-btn active-income" id="btnIncome" onclick="setType('income')">+ รายรับ</button>
        <button class="type-btn" id="btnExpense" onclick="setType('expense')">− รายจ่าย</button>
      </div>
    </div>
    <div class="form-group" style="flex:1;min-width:120px;">
      <label>หมวดหมู่</label>
      <select id="category">
        <option value="อื่นๆ">อื่นๆ</option>
        <option value="อาหาร">🍜 อาหาร</option>
        <option value="เดินทาง">🚗 เดินทาง</option>
        <option value="ช้อปปิ้ง">🛍️ ช้อปปิ้ง</option>
        <option value="สุขภาพ">💊 สุขภาพ</option>
        <option value="บันเทิง">🎮 บันเทิง</option>
        <option value="บิล/ค่าน้ำค่าไฟ">💡 บิล/ค่าน้ำค่าไฟ</option>
        <option value="เงินเดือน">💰 เงินเดือน</option>
        <option value="ฟรีแลนซ์">💻 ฟรีแลนซ์</option>
        <option value="ลงทุน">📈 ลงทุน</option>
      </select>
    </div>
    <button class="btn-add" onclick="addTransaction()">เพิ่ม</button>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('list', this)">รายการ</button>
  <button class="tab" onclick="switchTab('chart', this)">กราฟ</button>
</div>

<!-- List Tab -->
<div id="tabList">
  <div class="section-header">
    <div class="filter-row" style="margin:0;gap:8px;">
      <select class="filter-select" id="filterMonth" onchange="renderList()">
        <option value="">ทุกเดือน</option>
      </select>
      <select class="filter-select" id="filterType" onchange="renderList()">
        <option value="">ทั้งหมด</option>
        <option value="income">รายรับ</option>
        <option value="expense">รายจ่าย</option>
      </select>
    </div>
    <button class="btn-csv" onclick="exportCSV()">📥 Export CSV</button>
  </div>
  <div id="txList"></div>
</div>

<!-- Chart Tab -->
<div id="tabChart" style="display:none;">
  <div class="chart-card">
    <div class="chart-title">รายรับ vs รายจ่าย (6 เดือนล่าสุด)</div>
    <div class="chart-wrap"><canvas id="chartBar"></canvas></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">สัดส่วนรายจ่ายตามหมวดหมู่</div>
    <div class="chart-wrap"><canvas id="chartDoughnut"></canvas></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'budget_tracker_v1';
let transactions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentType = 'income';
let chartBar, chartDoughnut;

// Init date
document.getElementById('date').valueAsDate = new Date();

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
}

function setType(t) {
  currentType = t;
  document.getElementById('btnIncome').className = 'type-btn' + (t==='income' ? ' active-income' : '');
  document.getElementById('btnExpense').className = 'type-btn' + (t==='expense' ? ' active-expense' : '');
}

function fmt(n) {
  return '฿' + Math.abs(n).toLocaleString('th-TH', {minimumFractionDigits: 0, maximumFractionDigits: 2});
}

function addTransaction() {
  const desc = document.getElementById('desc').value.trim();
  const amount = parseFloat(document.getElementById('amount').value);
  const date = document.getElementById('date').value;
  const category = document.getElementById('category').value;

  if (!desc) { alert('ใส่ชื่อรายการด้วยนะ 😅'); return; }
  if (!amount || amount <= 0) { alert('ใส่จำนวนเงินด้วย'); return; }
  if (!date) { alert('เลือกวันที่ด้วย'); return; }

  transactions.unshift({
    id: Date.now(),
    desc, amount, date, category,
    type: currentType
  });

  save();
  renderAll();

  document.getElementById('desc').value = '';
  document.getElementById('amount').value = '';
  document.getElementById('date').valueAsDate = new Date();
}

function deleteTransaction(id) {
  transactions = transactions.filter(t => t.id !== id);
  save();
  renderAll();
}

function getFiltered() {
  const fm = document.getElementById('filterMonth').value;
  const ft = document.getElementById('filterType').value;
  return transactions.filter(t => {
    if (fm && !t.date.startsWith(fm)) return false;
    if (ft && t.type !== ft) return false;
    return true;
  });
}

function renderSummary() {
  const income = transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;
  document.getElementById('totalIncome').textContent = fmt(income);
  document.getElementById('totalExpense').textContent = fmt(expense);
  const el = document.getElementById('totalBalance');
  el.textContent = (balance < 0 ? '-' : '') + fmt(balance);
  el.style.color = balance < 0 ? 'var(--expense)' : balance > 0 ? 'var(--income)' : 'var(--text)';
}

function populateMonthFilter() {
  const months = [...new Set(transactions.map(t => t.date.slice(0,7)))].sort().reverse();
  const sel = document.getElementById('filterMonth');
  const cur = sel.value;
  sel.innerHTML = '<option value="">ทุกเดือน</option>';
  months.forEach(m => {
    const [y, mo] = m.split('-');
    const label = new Date(y, mo-1).toLocaleDateString('th-TH',{year:'numeric',month:'long'});
    sel.innerHTML += `<option value="${m}" ${m===cur?'selected':''}>${label}</option>`;
  });
}

function renderList() {
  const filtered = getFiltered();
  const container = document.getElementById('txList');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty">ยังไม่มีรายการ 📭</div>';
    return;
  }

  // Group by month
  const groups = {};
  filtered.forEach(t => {
    const key = t.date.slice(0,7);
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });

  container.innerHTML = Object.keys(groups).sort().reverse().map(key => {
    const [y, mo] = key.split('-');
    const label = new Date(y, mo-1).toLocaleDateString('th-TH',{year:'numeric',month:'long'});
    const items = groups[key].map(t => `
      <div class="tx-item">
        <div class="tx-dot ${t.type}"></div>
        <div class="tx-info">
          <div class="tx-desc">${t.desc}</div>
          <div class="tx-meta">${formatDate(t.date)}</div>
        </div>
        <span class="tx-cat">${t.category}</span>
        <span class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</span>
        <button class="btn-del" onclick="deleteTransaction(${t.id})" title="ลบ">×</button>
      </div>
    `).join('');
    return `<div class="month-group"><div class="month-label">${label}</div><div class="tx-list">${items}</div></div>`;
  }).join('');
}

function formatDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('th-TH', {day:'numeric', month:'short', year:'numeric'});
}

function renderCharts() {
  // Last 6 months
  const now = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(d.toISOString().slice(0,7));
  }

  const incomes = months.map(m => transactions.filter(t=>t.type==='income'&&t.date.startsWith(m)).reduce((s,t)=>s+t.amount,0));
  const expenses = months.map(m => transactions.filter(t=>t.type==='expense'&&t.date.startsWith(m)).reduce((s,t)=>s+t.amount,0));
  const labels = months.map(m => { const [y,mo]=m.split('-'); return new Date(y,mo-1).toLocaleDateString('th-TH',{month:'short',year:'2-digit'}); });

  if (chartBar) chartBar.destroy();
  chartBar = new Chart(document.getElementById('chartBar'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'รายรับ', data: incomes, backgroundColor: '#2d6a4f22', borderColor: '#2d6a4f', borderWidth: 2, borderRadius: 6 },
        { label: 'รายจ่าย', data: expenses, backgroundColor: '#c1121f22', borderColor: '#c1121f', borderWidth: 2, borderRadius: 6 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { font: { family: 'IBM Plex Sans Thai', size: 12 } } } },
      scales: { y: { grid: { color: '#e0ddd6' }, ticks: { callback: v => '฿'+v.toLocaleString() } }, x: { grid: { display: false } } }
    }
  });

  // Doughnut by category (expenses only)
  const catMap = {};
  transactions.filter(t=>t.type==='expense').forEach(t => {
    catMap[t.category] = (catMap[t.category]||0) + t.amount;
  });
  const catLabels = Object.keys(catMap);
  const catData = catLabels.map(k => catMap[k]);
  const colors = ['#2d6a4f','#52b788','#b7e4c7','#c1121f','#e63946','#457b9d','#1d3557','#f4a261','#e9c46a','#264653'];

  if (chartDoughnut) chartDoughnut.destroy();
  if (catLabels.length === 0) {
    document.getElementById('chartDoughnut').parentElement.innerHTML = '<div class="empty">ยังไม่มีรายจ่าย 😊</div>';
    return;
  }
  chartDoughnut = new Chart(document.getElementById('chartDoughnut'), {
    type: 'doughnut',
    data: {
      labels: catLabels,
      datasets: [{ data: catData, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { font: { family: 'IBM Plex Sans Thai', size: 12 }, padding: 12 } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ฿${ctx.raw.toLocaleString()}` } }
      }
    }
  });
}

function renderAll() {
  renderSummary();
  populateMonthFilter();
  renderList();
}

function switchTab(tab, el) {
  document.getElementById('tabList').style.display = tab==='list' ? '' : 'none';
  document.getElementById('tabChart').style.display = tab==='chart' ? '' : 'none';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (tab==='chart') renderCharts();
}

function exportCSV() {
  const filtered = getFiltered();
  if (filtered.length === 0) { alert('ไม่มีข้อมูลให้ export'); return; }
  const rows = [['วันที่','รายการ','หมวดหมู่','ประเภท','จำนวน (บาท)']];
  filtered.forEach(t => rows.push([t.date, t.desc, t.category, t.type==='income'?'รายรับ':'รายจ่าย', t.amount]));
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='budget.csv'; a.click();
  URL.revokeObjectURL(url);
}

renderAll();
</script>
</body>
</html>
